<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PropQuest</title>
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  
  <!-- Tailwind compiled CSS -->
  <link rel="stylesheet" href="./output.css" />
</head>
<body class="flex h-screen bg-gray-900 text-gray-100 overflow-hidden font-sans">

  <!-- 3. LEFT SIDEBAR -->
  <aside id="sidebar" class="w-[320px] h-full flex flex-col bg-gray-800 border-r border-gray-700 overflow-y-auto flex-shrink-0 z-10 shadow-xl relative">
    
    <!-- a. App logo/title -->
    <div class="p-5 border-b border-gray-700 bg-gray-900/50 sticky top-0 z-20 backdrop-blur-md">
      <h1 class="text-2xl font-bold flex items-center gap-2">
        <span class="text-xl">🏠</span> PropQuest
      </h1>
      <p class="text-sm text-gray-400 mt-1 font-medium">UK Property Search</p>
    </div>

    <!-- b. SEARCH INPUTS section -->
    <div class="p-5 border-b border-gray-700 flex flex-col gap-5">
      
      <!-- ── AI Natural Language Search ─────────────────────────── -->
      <div class="bg-gray-800 border border-gray-700 rounded-xl p-3 mb-4">
        
        <!-- Header row -->
        <div class="flex items-center gap-2 mb-2">
          <span
            class="text-xs font-medium text-purple-400 uppercase tracking-wide cursor-help"
            title="Natural language query is sent to an LLM (Gemini/GPT) which extracts structured filter params (price, beds, type). Those params are injected into an R-tree bounding-box spatial query over the loaded property dataset."
          >AI Search</span>
          <span class="text-xs bg-purple-900 text-purple-300 px-1.5 py-0.5 rounded text-[10px] font-mono">NLP→R-Tree</span>
          <span class="text-xs text-gray-500">· powered by NLP</span>
          <span id="nlp-spinner" style="display:none" class="text-xs text-purple-400 animate-pulse">⟳</span>
        </div>

        <!-- Input -->
        <div class="flex gap-2">
          <input
            id="nlp-query-input"
            type="text"
            onfocus="document.getElementById('nlp-history-list').style.display='block'"
            onblur="setTimeout(()=>document.getElementById('nlp-history-list').style.display='none',200)"
            placeholder="3 bed flat under £500k near good schools in South London"
            class="flex-1 bg-gray-900 text-gray-100 text-xs rounded-lg px-3 py-2 border border-gray-600 focus:border-purple-500 focus:outline-none placeholder-gray-600"
          />
          <button
            id="nlp-search-btn"
            class="bg-purple-600 hover:bg-purple-700 text-white text-xs font-medium px-3 py-2 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Search
          </button>
          <button
            id="nlp-clear-btn"
            onclick="
              document.getElementById('nlp-query-input').value='';
              document.getElementById('nlp-intent-display').style.display='none';
              document.getElementById('nlp-status').style.display='none';
            "
            class="text-gray-500 hover:text-gray-300 text-xs px-2 py-2 rounded-lg transition-colors"
            title="Clear"
          >✕</button>
        </div>

        <div id="nlp-history-list"
          style="display:none;background:#1f2937;border:0.5px solid #374151;border-radius:8px;margin-top:4px;overflow:hidden;max-height:160px;overflow-y:auto"
        ></div>

        <!-- Intent display — shows what AI understood -->
        <div
          id="nlp-intent-display"
          class="mt-2 p-2 bg-gray-900 rounded-lg border border-gray-700 text-xs"
          style="display:none"
        ></div>

        <!-- Status line -->
        <p id="nlp-status" class="mt-1 text-xs" style="display:none;font-size:11px"></p>

        <!-- Helper examples (clickable) -->
        <div class="flex flex-wrap gap-1 mt-2">
          <button onclick="document.getElementById('nlp-query-input').value=this.dataset.q"
            data-q="2 bed flat under £400k in East London"
            class="text-xs text-gray-500 hover:text-purple-400 border border-gray-700 rounded px-2 py-0.5 transition-colors">
            2 bed East London
          </button>
          <button onclick="document.getElementById('nlp-query-input').value=this.dataset.q"
            data-q="detached house 4 bedrooms over £600k with garden"
            class="text-xs text-gray-500 hover:text-purple-400 border border-gray-700 rounded px-2 py-0.5 transition-colors">
            4 bed detached
          </button>
          <button onclick="document.getElementById('nlp-query-input').value=this.dataset.q"
            data-q="studio flat under £250k near tube station"
            class="text-xs text-gray-500 hover:text-purple-400 border border-gray-700 rounded px-2 py-0.5 transition-colors">
            Studio near tube
          </button>
        </div>

      </div>
      <!-- ── end AI Search ─────────────────────────────────────────── -->
      <!-- Rightmove -->
      <div>
        <label for="rightmove-url" class="block text-sm font-semibold text-gray-300 mb-1.5 flex items-center justify-between">
          Rightmove URL
          <span class="w-2 h-2 rounded-full bg-blue-500"></span>
        </label>
        <textarea id="rightmove-url" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all resize-none shadow-inner" placeholder="https://www.rightmove.co.uk/property-for-sale/find.html?..."></textarea>
        <button id="search-rightmove" class="mt-2.5 w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2 rounded-lg transition-all shadow shadow-blue-900/50 active:scale-[0.98]">
          Search Rightmove
        </button>
      </div>

      <!-- Zoopla -->
      <div>
        <label for="zoopla-url" class="block text-sm font-semibold text-gray-300 mb-1.5 flex items-center justify-between">
          Zoopla URL
          <span class="w-2 h-2 rounded-full bg-purple-500"></span>
        </label>
        <textarea id="zoopla-url" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-2.5 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all resize-none shadow-inner" placeholder="https://www.zoopla.co.uk/for-sale/property/..."></textarea>
        <button id="search-zoopla" class="mt-2.5 w-full bg-purple-600 hover:bg-purple-500 text-white font-medium py-2 rounded-lg transition-all shadow shadow-purple-900/50 active:scale-[0.98]">
          Search Zoopla
        </button>
      </div>
    </div>

    <!-- c. FILTERS section -->
    <div class="p-5 border-b border-gray-700">
      <div class="flex items-center justify-between mb-4 cursor-pointer group" onclick="document.getElementById('filters-content').classList.toggle('hidden')">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest group-hover:text-gray-200 transition-colors">Filters</h3>
        <span class="text-gray-500 text-xs">▼</span>
      </div>
      
      <div id="filters-content" class="flex flex-col gap-4">
        <!-- Price range -->
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 font-medium">Price Range (£)</label>
          <div class="flex gap-2">
            <input type="number" id="min-price" placeholder="Min" class="w-1/2 bg-gray-900 border border-gray-700 rounded-md p-2 text-sm text-gray-200 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none" />
            <input type="number" id="max-price" placeholder="Max" class="w-1/2 bg-gray-900 border border-gray-700 rounded-md p-2 text-sm text-gray-200 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none" />
          </div>
        </div>
        
        <!-- Bedrooms -->
        <div>
          <label class="block text-xs text-gray-400 mb-1.5 font-medium">Bedrooms</label>
          <div class="flex gap-2">
            <input type="number" id="min-beds" placeholder="Min" class="w-1/2 bg-gray-900 border border-gray-700 rounded-md p-2 text-sm text-gray-200 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none" />
            <input type="number" id="max-beds" placeholder="Max" class="w-1/2 bg-gray-900 border border-gray-700 rounded-md p-2 text-sm text-gray-200 focus:border-green-500 focus:ring-1 focus:ring-green-500 outline-none" />
          </div>
        </div>

        <!-- Property type -->
        <div>
          <label class="block text-xs text-gray-400 mb-2 font-medium">Property Type</label>
          <div class="grid grid-cols-2 gap-2 text-sm text-gray-300">
            <label class="flex items-center gap-2 cursor-pointer hover:text-white transition-colors"><input type="checkbox" value="Detached" class="rounded bg-gray-900 border-gray-600 text-green-500 focus:ring-green-500 cursor-pointer" /> Detached</label>
            <label class="flex items-center gap-2 cursor-pointer hover:text-white transition-colors"><input type="checkbox" value="Semi-detached" class="rounded bg-gray-900 border-gray-600 text-green-500 focus:ring-green-500 cursor-pointer" /> Semi-detached</label>
            <label class="flex items-center gap-2 cursor-pointer hover:text-white transition-colors"><input type="checkbox" value="Terraced" class="rounded bg-gray-900 border-gray-600 text-green-500 focus:ring-green-500 cursor-pointer" /> Terraced</label>
            <label class="flex items-center gap-2 cursor-pointer hover:text-white transition-colors"><input type="checkbox" value="Flat" class="rounded bg-gray-900 border-gray-600 text-green-500 focus:ring-green-500 cursor-pointer" /> Flat</label>
          </div>
        </div>

        <button id="apply-filters" class="w-full bg-green-600 hover:bg-green-500 text-white font-medium py-2 rounded-lg transition-all mt-1 shadow shadow-green-900/50 active:scale-[0.98]">
          Apply Filters
        </button>
      </div>
    </div>

    <!-- d. RESULTS section -->
    <div class="p-5 flex-1 flex flex-col min-h-[250px] relative">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Results</h3>
        <span id="results-count" class="bg-gray-700/80 text-gray-300 text-xs px-2.5 py-1 rounded-full font-medium border border-gray-600">0 properties</span>
      </div>
      <div id="results-list" class="flex-1 overflow-y-auto space-y-3 -mx-2 px-2 custom-scrollbar">
        <!-- Property cards will be injected here -->
      </div>
    </div>

    <!-- e. MAP CONTROLS section -->
    <div class="p-5 border-t border-gray-700 bg-gray-800 sticky bottom-0 z-20 flex gap-3">
      <button id="clear-all" class="flex-1 bg-gray-700 hover:bg-red-500/20 hover:text-red-400 border border-transparent hover:border-red-500/50 text-gray-300 py-2 rounded-lg text-sm font-medium transition-all">Clear All</button>
      <button id="export-results" class="flex-1 bg-gray-700 hover:bg-gray-600 border border-gray-600 text-gray-200 py-2 rounded-lg text-sm font-medium transition-all">Export JSON</button>
    </div>
  </aside>

  <!-- 4. MAIN MAP AREA -->
  <main class="flex-1 relative bg-gray-950">
    <div id="map" class="w-full h-full z-0"></div>
    
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden absolute inset-0 bg-gray-900/70 backdrop-blur-sm z-50 flex flex-col items-center justify-center transition-opacity">
      <svg class="animate-spin h-12 w-12 text-blue-500 mb-4 drop-shadow-md" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span class="text-xl font-medium tracking-wide text-white drop-shadow">Fetching properties...</span>
      <span class="text-sm text-gray-400 mt-2">This may take a moment</span>
    </div>

    <!-- 5. PROPERTY DETAIL PANEL -->
    <aside id="detail-panel" class="absolute top-0 bottom-0 right-0 w-[380px] bg-gray-800 shadow-[0_0_40px_rgba(0,0,0,0.5)] transform translate-x-full transition-transform duration-300 ease-in-out z-40 border-l border-gray-700 flex flex-col">
      <!-- Header -->
      <div class="p-4 border-b border-gray-700 flex items-center justify-between bg-gray-900/80 backdrop-blur">
        <h3 class="font-bold text-gray-200">Property Details</h3>
        <button id="close-detail" class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-700 hover:bg-gray-600 text-gray-300 hover:text-white transition-colors">&times;</button>
      </div>

      <!-- Scrollable content -->
      <div class="flex-1 overflow-y-auto">
        <!-- Image Area -->
        <div id="property-images" class="w-full h-56 bg-gray-900 flex flex-col items-center justify-center text-gray-500 border-b border-gray-700 relative overflow-hidden group">
          <svg class="w-10 h-10 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          <span class="text-sm">No images available</span>
        </div>
        
        <div class="p-6">
          <div id="property-price" class="text-3xl font-extrabold text-green-400 mb-2 tracking-tight">£0</div>
          <h2 id="property-title" class="text-lg font-medium text-gray-200 mb-5 leading-snug">Property Address</h2>
          
          <div id="property-meta" class="flex gap-4 text-sm text-gray-300 mb-6 bg-gray-900/50 p-4 rounded-xl border border-gray-700/50 items-center justify-around">
            <div class="flex flex-col items-center"><span class="text-lg font-bold text-white" id="meta-beds">-</span><span class="text-xs text-gray-400">Beds</span></div>
            <div class="w-px h-8 bg-gray-700"></div>
            <div class="flex flex-col items-center"><span class="text-lg font-bold text-white" id="meta-type">-</span><span class="text-xs text-gray-400">Type</span></div>
          </div>

          <!-- Tabs -->
          <div class="flex border-b border-gray-700 mb-5">
            <button class="flex-1 pb-3 text-sm font-semibold border-b-2 border-blue-500 text-blue-400 transition-colors">Details</button>
            <button class="flex-1 pb-3 text-sm font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-200 transition-colors">Local Area</button>
          </div>

          <div id="property-details-content" class="text-sm text-gray-300 space-y-4 leading-relaxed">
            <!-- Details injection -->
            <p class="animate-pulse bg-gray-700 h-4 w-3/4 rounded"></p>
            <p class="animate-pulse bg-gray-700 h-4 w-full rounded"></p>
            <p class="animate-pulse bg-gray-700 h-4 w-5/6 rounded"></p>
          </div>
          <div id="property-local-content" class="hidden text-sm text-gray-300">
            <!-- Local area injection -->
          </div>
        </div>
      </div>
      
      <!-- Action buttons -->
      <div class="p-5 border-t border-gray-700 bg-gray-900/80 backdrop-blur">
        <a id="view-on-site-btn" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full text-center bg-gray-200 hover:bg-white text-gray-900 py-3 rounded-lg font-bold transition-colors shadow-lg active:scale-[0.98]">
          View on Website
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
        </a>
      </div>
    </aside>
  </main>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="../client/rtree.js"></script>
  <script src="../client/map.js"></script>
  <script src="../client/requests.js"></script>
  <script src="../client/markers.js"></script>
  <script src="../client/filters.js"></script>
  <script src="../client/storage.js"></script>
  <script src="../client/ui.js"></script>
  <script src="../client/nlp.js"></script>
  <script src="./renderer.js"></script>

</body>
</html>
